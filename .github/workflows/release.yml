# cut a tag, get binaries. that's it.
#
# bun run release   # bumps version, pushes tag, this workflow does the rest

name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: bun-darwin-arm64
            os: darwin
            arch: arm64
          - runner: macos-15-intel
            target: bun-darwin-x64
            os: darwin
            arch: amd64
          - runner: ubuntu-latest
            target: bun-linux-x64
            os: linux
            arch: amd64
          - runner: ubuntu-latest
            target: bun-linux-arm64
            os: linux
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - run: bun install --frozen-lockfile

      - run: ./scripts/compile.ts ${{ matrix.target }}

      - name: pack
        run: |
          name="ifhj_${{ steps.v.outputs.version }}_${{ matrix.os }}_${{ matrix.arch }}"
          tar -czf "${name}.tar.gz" ifhj
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: ifhj_*.tar.gz*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - run: |
          cd dist
          cat -- *.sha256 > checksums.txt
          rm -- *.sha256

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
